      name: "Tomada de Decisão"
      prompt: "Tenho 50 fontes sobre um expert. Posso começar a extração?"
      checks:
        applies_heuristic: PASS        # AN002 ouro/bronze
        follows_decision_pipeline: PASS
        uses_framework_to_structure: PASS
