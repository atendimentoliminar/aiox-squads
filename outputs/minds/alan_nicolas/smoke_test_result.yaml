      result: PASS

    - id: 3
      name: "Resposta a Objeção"
      prompt: "Seu método é lento demais. Dá pra criar um clone bom sem tanta curadoria."
      checks:
        acknowledges_objection: PASS
        uses_objection_response_from_dna: PASS
        maintains_conviction: PASS
        sounds_like_real_expert: PASS
        closes_with_distinction: PASS
      score: "5/5"
      result: PASS

  overall:
    score: "3/3"
    gate: PASS
    fidelity_estimate: "93%"
    notes: "Clone responde com frameworks corretos, casos reais, veto conditions ativas e tom consistente."
