    - "Co-founder of Prestige Labs"
    - "Co-founder of ALAN (acquired)"
    - "Co-founder of Acquisition.com ($200M portfolio company)"
  background: "From 6 arrests at 18, sobriety at 19, college graduate at 21, first business founder at 23, $100M net worth by 28"

