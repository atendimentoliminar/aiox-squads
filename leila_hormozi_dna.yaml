dna_extraction_notes:
  important_distinction: "Unlike her husband Alex Hormozi (who authored bestselling books like '100M Offers'), Leila Hormozi's primary content distribution channels are podcasts, YouTube videos, and social media rather than published books. Her 'DNA' is most accessible through her podcast 'Build with Leila Hormozi' (330+ episodes) and YouTube channel (1.11M subscribers)."

  content_philosophy: "Leila emphasizes making real business education accessible to anyone with no paywalls and no holding back, making her content freely available across multiple platforms."

  research_transparency: "No published books found under Leila Hormozi's sole authorship. All references to '100 Million Dollar Business' appear to relate to her business achievements, not a published work. Most frameworks are documented through podcast episodes, interviews, and third-party compilations rather than formal publications."

  primary_dna_sources: ["Build with Leila Hormozi podcast", "YouTube channel", "LinkedIn profile", "Guest podcast appearances"]
