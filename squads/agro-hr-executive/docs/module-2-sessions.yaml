sessions:
  - id: "M2-S1"
    title: "Lideranca como alavanca de execucao"
    hook: "Mesma estrategia, resultados opostos entre unidades"
    framework: "Capacidade organizacional + passagens de lideranca"
    activity: "Diagnostico de falhas de lideranca por unidade"
    transfer: "Qual comportamento gerencial precisa virar padrao?"
  - id: "M2-S2"
    title: "Performance management sem burocracia"
    hook: "Excelencia tecnica nao vira automaticamente boa lideranca"
    framework: "Accountability, feedback e rituais curtos de performance"
    activity: "Desenho de ritual semanal e mensal de gestao"
    transfer: "Quais rituais faltam hoje para sustentar resultado?"
  - id: "M2-S3"
    title: "Cultura, disciplina e comportamento"
    hook: "Cultura e o que a empresa tolera repetidamente"
    framework: "Capacidades, incentivos e exemplos de lideranca"
    activity: "Mapa de comportamentos reforcados versus desejados"
    transfer: "O que hoje e simbolicamente recompensado na empresa?"
  - id: "M2-S4"
    title: "Mudanca de people model e adocao"
    hook: "Mudancas morrem quando nao constroem coalizao e quick wins"
    framework: "Kotter 8-step aplicado a people agenda"
    activity: "Desenho de coalizao e plano de quick wins"
    transfer: "Qual primeira vitoria visivel precisa acontecer em 30 dias?"
