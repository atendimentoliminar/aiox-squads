mind_dna:
  metadata:
    name: "David Heinemeier Hansson"
    slug: "dhh"
    handle: "@dhh"
    domain: "Software Craft, Calm Company, Bootstrapping, Shape Up, Remote Work, Anti-VC Philosophy"
