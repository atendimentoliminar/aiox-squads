name: Squad Catalog

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "squads/**"
      - "README.md"
      - "doc/README.en.md"
      - ".github/workflows/squad-catalog.yml"
  push:
    branches: [main]
    paths:
      - "squads/**"
      - "README.md"
      - "doc/README.en.md"
      - ".github/workflows/squad-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  verify-catalog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Check generated catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CATALOG_PR_NUMBER: ${{ github.event.pull_request.number }}
          CATALOG_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          CATALOG_BASE_REF: ${{ github.base_ref }}
        run: |
          python squads/squad-creator/scripts/update-readme-catalog.py --write
          if git diff --quiet -- README.md doc/README.en.md; then
            echo "Catalog is up to date."
            exit 0
          fi

          echo "::error::README catalog is out of date. Run the catalog sync script and commit the updated READMEs."
          git diff -- README.md doc/README.en.md
          exit 1

  sync-catalog:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML

      - name: Generate catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python squads/squad-creator/scripts/update-readme-catalog.py --write

      - name: Commit updated catalog
        run: |
          if git diff --quiet -- README.md doc/README.en.md; then
            echo "Catalog already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md doc/README.en.md
          git commit -m "docs: sync squad catalog"
          git push
